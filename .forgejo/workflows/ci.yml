name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: codeberg-small
    env:
      MIX_ENV: test
      ImageOS: ubuntu24
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/erlef/setup-beam@v1
        env:
          ImageOS: ubuntu24
        with:
          elixir-version: '1.18.3'
          otp-version: '27.2.4'
      - uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: mix-
      - run: mix local.hex --force && mix local.rebar --force && mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict
      - run: mix test

  dialyzer:
    runs-on: codeberg-medium
    env:
      MIX_ENV: test
      ImageOS: ubuntu24
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - uses: https://github.com/erlef/setup-beam@v1
        env:
          ImageOS: ubuntu24
        with:
          elixir-version: '1.18.3'
          otp-version: '27.2.4'
      - uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: dialyzer-${{ hashFiles('**/mix.lock') }}
          restore-keys: dialyzer-
      - run: mix local.hex --force && mix local.rebar --force && mix deps.get
      - run: mix dialyzer
